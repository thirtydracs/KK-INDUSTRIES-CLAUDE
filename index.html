<!DOCTYPE html>
<html>
<head>
  <title>K&K Industries Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 16px;
      color: #1f2933;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .topbar {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 14px;
    }

    /* FIX: Counts now show filtered results separately from totals */
    .counts {
      font-weight: bold;
      margin-bottom: 14px;
      line-height: 1.5;
      font-size: 14px;
      color: #374151;
    }

    .counts .counts-total {
      color: #6b7280;
      font-weight: normal;
      margin-left: 8px;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .filters button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: #e5e7eb;
      color: #1f2933;
      transition: background 0.15s, color 0.15s;
    }

    .filters button:hover {
      background: #d1d5db;
    }

    /* FIX: Active filter button state */
    .filters button.active {
      background: #1f2933;
      color: white;
    }

    /* FIX: Search wrapper for clear button */
    .search-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 320px;
    }

    .search {
      width: 100%;
      padding: 10px 36px 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
    }

    /* FIX: Search clear button */
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 16px;
      padding: 0;
      line-height: 1;
      display: none;
    }

    .search-clear.visible {
      display: block;
    }

    .search-clear:hover {
      color: #1f2933;
    }

    .jobs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      text-decoration: none;
      color: inherit;
      display: block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      /* FIX: Hover affordance */
      transition: box-shadow 0.15s ease, transform 0.15s ease;
      cursor: pointer;
    }

    /* FIX: Card hover state */
    .card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.09);
      transform: translateY(-2px);
    }

    .card.red   { border-left: 6px solid #dc2626; }
    .card.amber { border-left: 6px solid #f59e0b; }
    .card.green { border-left: 6px solid #16a34a; }
    .card.grey  { border-left: 6px solid #6b7280; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .job-name {
      font-size: 20px;
      font-weight: bold;
      margin: 0;
    }

    .status-pill {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-pill.red   { background: #fee2e2; color: #991b1b; }
    .status-pill.amber { background: #fef3c7; color: #92400e; }
    .status-pill.green { background: #dcfce7; color: #166534; }
    .status-pill.grey  { background: #e5e7eb; color: #374151; }

    .line {
      margin: 6px 0;
      font-size: 15px;
      line-height: 1.5;
    }

    .label {
      font-weight: bold;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 18px;
      color: #6b7280;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }

      .topbar,
      .card,
      .empty { padding: 16px; }

      h1 { font-size: 24px; }

      .job-name { font-size: 18px; }

      .card-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .search-wrap {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>K&amp;K Industries Hub</h1>
      <div class="sub">Weekly site position across active jobs</div>

      <div class="counts" id="counts"></div>

      <div class="filters">
        <button class="active" onclick="setFilter('all', this)">All</button>
        <button onclick="setFilter('red', this)">🔴 At Risk</button>
        <button onclick="setFilter('amber', this)">🟡 Watch</button>
        <button onclick="setFilter('green', this)">🟢 On Track</button>
        <button onclick="setFilter('grey', this)">⚪ Blind Spots</button>
      </div>

      <div class="search-wrap">
        <input
          class="search"
          type="text"
          id="searchInput"
          placeholder="Search jobs..."
          oninput="setSearch(this.value)"
        />
        <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Clear search">✕</button>
      </div>
    </div>

    <div class="jobs" id="jobs"></div>
  </div>

  <script src="data.js"></script>
  <script>
    let currentFilter = "all";
    let currentSearch = "";

    function niceStatus(status) {
      if (status === "red")   return "At Risk";
      if (status === "amber") return "Watch";
      if (status === "green") return "On Track";
      if (status === "grey")  return "Blind Spot";
      return status;
    }

    // FIX: Pass button element, remove active from all, apply to clicked
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderJobs();
    }

    function setSearch(value) {
      currentSearch = value.toLowerCase().trim();
      // FIX: Show/hide clear button
      document.getElementById("searchClear").classList.toggle("visible", value.length > 0);
      renderJobs();
    }

    // FIX: Clear search function
    function clearSearch() {
      const input = document.getElementById("searchInput");
      input.value = "";
      document.getElementById("searchClear").classList.remove("visible");
      currentSearch = "";
      renderJobs();
      input.focus();
    }

    function renderJobs() {
      const jobsWrap = document.getElementById("jobs");
      jobsWrap.innerHTML = "";

      const filteredJobs = jobs.filter(job => {
        const filterMatch = currentFilter === "all" || job.status === currentFilter;
        const searchMatch =
          job.name.toLowerCase().includes(currentSearch) ||
          job.issue.toLowerCase().includes(currentSearch) ||
          job.holdingUp.toLowerCase().includes(currentSearch);
        return filterMatch && searchMatch;
      });

      if (filteredJobs.length === 0) {
        jobsWrap.innerHTML = `<div class="empty">No jobs match this filter.</div>`;
        updateCounts(filteredJobs);
        return;
      }

      filteredJobs.forEach(job => {
        const card = document.createElement("a");
        card.className = "card " + job.status;
        card.href = "jobs/job.html?id=" + job.id;

        card.innerHTML = `
          <div class="card-top">
            <h2 class="job-name">${job.name}</h2>
            <div class="status-pill ${job.status}">${niceStatus(job.status)}</div>
          </div>
          <div class="line"><span class="label">Issue:</span> ${job.issue}</div>
          <div class="line"><span class="label">Labour:</span> ${job.labour}</div>
          <div class="line"><span class="label">Holding Up:</span> ${job.holdingUp}</div>
          <div class="line"><span class="label">Next:</span> ${job.next}</div>
        `;

        jobsWrap.appendChild(card);
      });

      updateCounts(filteredJobs);
    }

    // FIX: Counts now reflect filtered view with totals shown separately
    function updateCounts(filteredJobs) {
      const total  = jobs.length;
      const red    = jobs.filter(j => j.status === "red").length;
      const amber  = jobs.filter(j => j.status === "amber").length;
      const grey   = jobs.filter(j => j.status === "grey").length;
      const fCount = filteredJobs ? filteredJobs.length : total;

      let countsEl = document.getElementById("counts");

      if (currentFilter === "all" && !currentSearch) {
        countsEl.innerHTML =
          `Jobs: ${total} &nbsp;|&nbsp; At Risk: ${red} &nbsp;|&nbsp; Watch: ${amber} &nbsp;|&nbsp; Blind Spots: ${grey}`;
      } else {
        countsEl.innerHTML =
          `Showing ${fCount} of ${total} jobs` +
          `<span class="counts-total"> &nbsp;(Total — At Risk: ${red} | Watch: ${amber} | Blind Spots: ${grey})</span>`;
      }
    }

    renderJobs();
  </script>
</body>
</html>
